<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - 迷你兄弟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-logo">MB</div>
        <h1 class="login-title">欢迎回来</h1>
        <p class="login-subtitle">登录您的迷你兄弟账号</p>
      </div>
      
      <form class="login-form" id="loginForm">
        <div>
          <input type="email" class="form-input" id="loginEmail" placeholder="邮箱地址" required>
        </div>
        <div>
          <input type="password" class="form-input" id="loginPassword" placeholder="密码" required>
        </div>
        <div style="display: flex; justify-content: flex-end;">
          <a href="#" style="font-size: 14px; color: var(--accent); text-decoration: none;" onclick="showReset()">忘记密码？</a>
        </div>
        <button type="submit" class="btn-primary btn-block" id="loginBtn">登录</button>
      </form>

      <div style="margin: 20px 0; display: flex; align-items: center; gap: 12px;">
        <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
        <span style="font-size: 13px; color: var(--text-tertiary);">或</span>
        <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
      </div>

      <div class="oauth-buttons">
        <button class="btn-outline" style="flex: 1;" disabled style="opacity:0.5">
          <span>GitHub</span>
        </button>
        <button class="btn-outline" style="flex: 1;" disabled style="opacity:0.5">
          <span>Google</span>
        </button>
        <button class="btn-outline" style="flex: 1;" disabled style="opacity:0.5">
          <span>Telegram</span>
        </button>
      </div>

      <div class="login-footer">
        还没有账号？<a href="register.html">立即注册</a>
      </div>
    </div>
  </div>

  <!-- 忘记密码弹窗 -->
  <div id="resetOverlay" class="confirm-overlay">
    <div class="confirm-modal" style="width: 380px;">
      <div class="confirm-header">
        <div class="confirm-icon confirm-warn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <span class="confirm-title">重置密码</span>
      </div>
      <div class="confirm-body">
        <p style="margin-bottom: 16px;">请输入您的注册邮箱</p>
        <input type="email" class="form-input" id="resetEmail" placeholder="邮箱地址" required>
        <button class="btn-primary btn-block" style="margin-top: 16px;" onclick="handleResetPassword()">发送重置链接</button>
      </div>
      <div class="confirm-footer">
        <button class="confirm-btn-cancel" onclick="closeReset()">取消</button>
      </div>
    </div>
  </div>

  <!-- Toast容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="main.js"></script>
  <script>
    function showReset() {
      document.getElementById('resetOverlay').classList.add('active');
    }
    function closeReset() {
      document.getElementById('resetOverlay').classList.remove('active');
    }
    function handleResetPassword() {
      const email = document.getElementById('resetEmail').value;
      if (!email) {
        MB.toast('请输入邮箱地址', 'error');
        return;
      }
      MB.toast('重置链接已发送（演示模式）', 'success');
      closeReset();
    }
  </script>
</body>
</html>
